# 版本：1.0
# 功能：每天自动从远程获取最新的视频资源数据源列表并更新 kvideo.json
# 数据来源：https://github.com/hafrey1/LunaTV-config

name: 更新 KVideo 数据源

on:
  schedule:
    # 北京时间每天 0:00 运行（UTC 16:00）
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  update-kvideo:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 获取北京时间
      - name: 获取北京时间
        run: |
          echo "CURRENT_DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      # 运行更新脚本
      - name: 运行更新脚本
        id: update
        run: |
          python .github/scripts/update_kvideo.py
        continue-on-error: true

      # 检查是否有变更
      - name: 检查变更状态
        run: |
          if git diff --staged --quiet; then
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
            echo "文件无变更"
          else
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
            echo "检测到文件变更"
          fi

      # 推送更新
      - name: 推送更新
        if: steps.update.outputs.HAS_CHANGES == 'true'
        run: |
          echo "推送更新..."
